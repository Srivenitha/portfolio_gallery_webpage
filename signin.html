<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up</title>

<style>

body{

font-family:Arial,sans-serif;

background:#f2f2f2;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}

.signup-container{

background:white;

padding:30px;

width:350px;

border-radius:10px;

box-shadow:0 0 15px rgba(0,0,0,.2);

}

h2{

text-align:center;

}

input{

width:100%;

padding:10px;

margin:10px 0;

box-sizing:border-box;

}

button{

width:100%;

padding:10px;

background:#007bff;

color:white;

border:none;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#0056b3;

}

#password-error{

color:red;

text-align:center;

margin-top:10px;

}

</style>

</head>

<body>

<div class="signup-container">

<h2>Create Account</h2>

<form id="signupForm">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button type="submit">Sign Up</button>

<p id="password-error"></p>

</form>

</div>

<script>

const signupForm=document.getElementById("signupForm");

signupForm.addEventListener("submit",function(event){

event.preventDefault();

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value;

const confirm=document.getElementById("confirmPassword").value;

const error=document.getElementById("password-error");

error.style.color="red";

const upper=/[A-Z]/;

const lower=/[a-z]/;

const number=/[0-9]/;

const special=/[!@#$%^&*(),.?":{}|<>]/;

if(email===""){

error.textContent="Email is required.";

return;

}

if(password.length<8){

error.textContent="Password must be at least 8 characters.";

return;

}

if(!upper.test(password)){

error.textContent="Include at least one uppercase letter.";

return;

}

if(!lower.test(password)){

error.textContent="Include at least one lowercase letter.";

return;

}

if(!number.test(password)){

error.textContent="Include at least one number.";

return;

}

if(!special.test(password)){

error.textContent="Include at least one special character.";

return;

}

if(password!==confirm){

error.textContent="Passwords do not match.";

return;

}

error.style.color="green";

error.textContent="Registration Successful!";

setTimeout(()=>{

window.location.href="login.html";

},1000);

});

</script>

</body>
</html>
